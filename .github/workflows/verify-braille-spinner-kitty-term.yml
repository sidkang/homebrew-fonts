name: Verify Braille Spinner Kitty Term

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/verify-braille-spinner-kitty-term.yml
      - fonts/braille-spinner-kitty-term/**
  pull_request:
    paths:
      - .github/workflows/verify-braille-spinner-kitty-term.yml
      - fonts/braille-spinner-kitty-term/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-braille-spinner-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.28
          enable-cache: false
      - name: Build and verify
        run: fonts/braille-spinner-kitty-term/build.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: braille-spinner-kitty-term
          path: dist/releases/BrailleSpinnerKittyTerm-*.zip
          if-no-files-found: error
