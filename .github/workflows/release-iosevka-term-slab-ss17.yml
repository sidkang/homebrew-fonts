name: Release Iosevka Term Slab SS17

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Immutable release version (for example, 34.7.0 or 34.7.0-1)
        required: true
        default: 34.7.0

permissions:
  contents: read

concurrency:
  group: release-iosevka-term-slab-ss17
  cancel-in-progress: false

jobs:
  build:
    # A dispatch against another ref cannot execute release code or receive write permissions.
    if: github.repository == 'sidkang/homebrew-fonts' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - name: Check out pinned Iosevka source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: be5invis/Iosevka
          ref: 6828cb0bd569992bb19565a5e448540de3b50541 # v34.7.0
          path: .upstream/iosevka
          persist-credentials: false
          fetch-depth: 1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.28
          enable-cache: false
      - name: Build and verify
        env:
          IOSEVKA_SOURCE: ${{ github.workspace }}/.upstream/iosevka
        run: fonts/iosevka-term-slab-ss17/build.sh
      - id: version
        name: Validate release version
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          requested = os.environ["RELEASE_VERSION"]
          source_version = json.loads(
              Path("dist/iosevka-term-slab-ss17/BUILD-INFO.json").read_text()
          )["source"]["version"]
          if not re.fullmatch(rf"{re.escape(source_version)}(?:-[0-9A-Za-z.]+)?", requested):
              raise SystemExit(
                  f"release version {requested!r} must be {source_version!r} or start with it and '-'."
              )
          Path(os.environ["GITHUB_OUTPUT"]).open("a").write(f"value={requested}\n")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: iosevka-term-slab-ss17-release
          path: dist/releases/IosevkaTermSlabSS17-*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: iosevka-term-slab-ss17-release
          path: release
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="iosevka-term-slab-ss17-v${RELEASE_VERSION}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $tag" >&2
            exit 1
          fi
          gh release create "$tag" release/IosevkaTermSlabSS17-*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_TARGET" \
            --title "Iosevka Term Slab SS17 ${RELEASE_VERSION}" \
            --generate-notes
