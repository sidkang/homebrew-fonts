name: Release Iosevka Term Slab SS17

on:
  push:
    tags:
      - iosevka-term-slab-ss17-v*

permissions:
  contents: read

concurrency:
  group: release-iosevka-term-slab-ss17
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'sidkang/homebrew-fonts'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - name: Check out pinned Iosevka source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: be5invis/Iosevka
          ref: 6828cb0bd569992bb19565a5e448540de3b50541 # v34.7.0
          path: .upstream/iosevka
          persist-credentials: false
          fetch-depth: 1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.28
          enable-cache: false
      - name: Build and verify
        env:
          IOSEVKA_SOURCE: ${{ github.workspace }}/.upstream/iosevka
        run: fonts/iosevka-term-slab-ss17/build.sh
      - id: version
        name: Validate version tag
        run: |
          set -euo pipefail
          source_version=$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("dist/iosevka-term-slab-ss17/BUILD-INFO.json").read_text())["source"]["version"])
          PY
          )
          test "$GITHUB_REF_NAME" = "iosevka-term-slab-ss17-v$source_version"
          echo "value=$source_version" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: iosevka-term-slab-ss17-release
          path: dist/releases/IosevkaTermSlabSS17-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: iosevka-term-slab-ss17-release
          path: release
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="iosevka-term-slab-ss17-v${RELEASE_VERSION}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" release/IosevkaTermSlabSS17-"${RELEASE_VERSION}".zip \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_TARGET" \
              --title "Iosevka Term Slab SS17 ${RELEASE_VERSION}" \
              --generate-notes
          fi
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: master
          persist-credentials: true
          fetch-depth: 1
      - name: Update Homebrew cask
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          sha256=$(sha256sum "release/IosevkaTermSlabSS17-${RELEASE_VERSION}.zip" | awk '{print $1}')
          cat > Casks/font-iosevka-term-slab-ss17.rb <<EOF
          cask "font-iosevka-term-slab-ss17" do
            version "${RELEASE_VERSION}"
            sha256 "${sha256}"

            url "https://github.com/sidkang/homebrew-fonts/releases/download/iosevka-term-slab-ss17-v${RELEASE_VERSION}/IosevkaTermSlabSS17-${RELEASE_VERSION}.zip"
            name "Iosevka Term Slab SS17"
            desc "Terminal-width slab-serif Iosevka in SS17 style"
            homepage "https://github.com/sidkang/homebrew-fonts/tree/master/fonts/iosevka-term-slab-ss17"

            font "IosevkaTermSlabSS17.ttc"
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/font-iosevka-term-slab-ss17.rb
          git diff --cached --quiet || git commit -m "chore(cask): release Iosevka Term Slab SS17 ${RELEASE_VERSION}"
          git push origin HEAD:master
