name: Verify Iosevka Term Slab SS17

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/verify-iosevka-term-slab-ss17.yml
      - fonts/iosevka-term-slab-ss17/**
  pull_request:
    paths:
      - .github/workflows/verify-iosevka-term-slab-ss17.yml
      - fonts/iosevka-term-slab-ss17/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-iosevka-term-slab-ss17-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Check out pinned Iosevka source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: be5invis/Iosevka
          ref: 6828cb0bd569992bb19565a5e448540de3b50541 # v34.7.0
          path: .upstream/iosevka
          persist-credentials: false
          fetch-depth: 1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.28
          enable-cache: false
      - name: Build and verify
        env:
          IOSEVKA_SOURCE: ${{ github.workspace }}/.upstream/iosevka
        run: fonts/iosevka-term-slab-ss17/build.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: iosevka-term-slab-ss17
          path: dist/releases/IosevkaTermSlabSS17-*.zip
          if-no-files-found: error
