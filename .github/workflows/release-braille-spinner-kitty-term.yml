name: Release Braille Spinner Kitty Term

on:
  push:
    tags:
      - braille-spinner-kitty-term-v*

permissions:
  contents: read

concurrency:
  group: release-braille-spinner-kitty-term
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'sidkang/homebrew-fonts'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.28
          enable-cache: false
      - id: version
        name: Validate version tag
        run: |
          set -euo pipefail
          version=$(uv run fonts/braille-spinner-kitty-term/build.py --version)
          test "$GITHUB_REF_NAME" = "braille-spinner-kitty-term-v$version"
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - name: Build and verify
        run: fonts/braille-spinner-kitty-term/build.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: braille-spinner-release
          path: dist/releases/BrailleSpinnerKittyTerm-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      # This checkout is only a Git worktree for the generated cask commit.
      # No repository code runs in the write-permission publish job.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: master
          persist-credentials: true
          fetch-depth: 1
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: braille-spinner-release
          path: release
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="braille-spinner-kitty-term-v${RELEASE_VERSION}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" release/BrailleSpinnerKittyTerm-"${RELEASE_VERSION}".zip \
              --repo "$GITHUB_REPOSITORY" \
              --target "$RELEASE_TARGET" \
              --title "Braille Spinner Kitty Term ${RELEASE_VERSION}" \
              --generate-notes
          fi
      - name: Update Homebrew cask
        env:
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          sha256=$(sha256sum "release/BrailleSpinnerKittyTerm-${RELEASE_VERSION}.zip" | awk '{print $1}')
          cat > Casks/font-braille-spinner-kitty-term.rb <<EOF
          cask "font-braille-spinner-kitty-term" do
            version "${RELEASE_VERSION}"
            sha256 "${sha256}"

            url "https://github.com/sidkang/homebrew-fonts/releases/download/braille-spinner-kitty-term-v${RELEASE_VERSION}/BrailleSpinnerKittyTerm-${RELEASE_VERSION}.zip"
            name "Braille Spinner Kitty Term"
            desc "Fixed-grid private-use Braille spinner glyphs for Kitty terminals"
            homepage "https://github.com/sidkang/homebrew-fonts/tree/master/fonts/braille-spinner-kitty-term"

            font "BrailleSpinnerKittyTerm-Regular.ttf"
          end
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/font-braille-spinner-kitty-term.rb
          git diff --cached --quiet || git commit -m "chore(cask): release Braille Spinner Kitty Term ${RELEASE_VERSION}"
          git push origin HEAD:master
