name: Release Braille Spinner Kitty Term

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-braille-spinner-kitty-term
  cancel-in-progress: false

jobs:
  build:
    # A dispatch against another ref cannot execute release code or receive write permissions.
    if: github.repository == 'sidkang/homebrew-fonts' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          fetch-depth: 1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 0.11.28
          enable-cache: false
      - id: version
        name: Read module version
        run: echo "value=$(uv run fonts/braille-spinner-kitty-term/build.py --version)" >> "$GITHUB_OUTPUT"
      - name: Build and verify
        run: fonts/braille-spinner-kitty-term/build.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: braille-spinner-release
          path: dist/releases/BrailleSpinnerKittyTerm-${{ steps.version.outputs.value }}.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: braille-spinner-release
          path: release
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.build.outputs.version }}
          RELEASE_TARGET: ${{ github.sha }}
        run: |
          set -euo pipefail
          tag="braille-spinner-kitty-term-v${RELEASE_VERSION}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release already exists: $tag" >&2
            exit 1
          fi
          gh release create "$tag" release/BrailleSpinnerKittyTerm-"${RELEASE_VERSION}".zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_TARGET" \
            --title "Braille Spinner Kitty Term ${RELEASE_VERSION}" \
            --generate-notes
